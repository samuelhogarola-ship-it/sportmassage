/* ── Language switcher ─────────────────────────────────────────── */
function setLang(lang) {
  if (!T[lang]) lang = 'es';
  var t = T[lang];

  /* active button */
  ['es','en','fi'].forEach(function(l) {
    document.getElementById('btn-' + l).classList.toggle('active', l === lang);
  });

  /* html lang attribute */
  document.documentElement.lang = lang;

  /* nav + static data-key elements */
  document.querySelectorAll('[data-key]').forEach(function(el) {
    var k = el.dataset.key;
    if (t[k] !== undefined) el.innerHTML = t[k];
  });

  /* legal content */
  document.getElementById('legal-root').innerHTML = renderLegal(lang);

  /* persist */
  try { localStorage.setItem('smf-lang', lang); } catch(e) {}
}

(function() {
  var saved = 'es';
  try { saved = localStorage.getItem('smf-lang') || 'es'; } catch(e) {}

})();
